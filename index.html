<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>T4噬菌体 × 大肠杆菌</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
  }

  canvas { display: block; }

  /* ===== 模式遮罩 ===== */

    background: linear-gradient(160deg, rgba(0, 20, 50, 0.95) 0%, rgba(0, 30, 40, 0.9) 100%);

  #modal-box h2 {

    letter-spacing: 0.3em;

    text-transform: uppercase;
    margin-bottom: 20px;

  }
  #modal-warning {
    font-size: 15px;

    color: #c5e0ee;

  .mode-btn {

  .level-btn.selected {
    background: rgba(0,100,160,0.7);
    border-color: rgba(0,200,255,0.7);
    color: #e0f4ff;

  #start-btn {
    width: 100%;

    border: 1px solid rgba(0,200,240,0.4);
    color: #d0f0ff;
    font-size: 15px;
    letter-spacing: 0.25em;
    cursor: pointer;

  #start-btn:hover {
    background: linear-gradient(90deg, rgba(0,110,180,0.9), rgba(0,150,200,0.8));
    box-shadow: 0 0 20px rgba(0,160,240,0.3);
  }

  /* ===== HUD ===== */
  #hud {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 20px;
    align-items: center;
    background: rgba(0,8,24,0.6);
    border: 1px solid rgba(0,160,200,0.15);
    border-radius: 3px;
    padding: 10px 22px;
    z-index: 100;
  }
  #hud .hud-item {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(100,200,230,0.5);
  }
  #hud .hud-sep { color: rgba(0,160,180,0.2); }
  #dragging-indicator {
    position: fixed; top: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; letter-spacing: 0.2em;
    color: rgba(0,220,255,0.5);
    background: rgba(0,10,30,0.5);
    padding: 5px 14px; border-radius: 2px;
    display: none;
    z-index: 100;
    border: 1px solid rgba(0,180,220,0.15);
  }

  #ecoli-indicator {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 120;
    color: rgba(140, 255, 180, 0.9);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-shadow: 0 0 8px rgba(80, 255, 150, 0.45);
  }

  #ecoli-arrow {
    width: 0;
    height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 16px solid rgba(120, 255, 170, 0.95);
    filter: drop-shadow(0 0 6px rgba(80, 255, 140, 0.6));
    transform-origin: 50% 50%;
  }

  #infection-status {
    position: fixed;
    left: 18px;
    top: 18px;
    z-index: 130;
    color: rgba(170,255,235,0.92);
    background: rgba(0,20,26,0.58);
    border: 1px solid rgba(90,220,210,0.35);
    border-radius: 3px;
    padding: 8px 12px;
    letter-spacing: 0.08em;
    font-size: 12px;
    text-shadow: 0 0 8px rgba(80,255,210,0.25);
    pointer-events: none;
  }

  #infection-desc {
    position: fixed;
    left: 18px;
    top: 56px;
    z-index: 130;
    max-width: 340px;
    color: rgba(175, 235, 228, 0.88);
    background: rgba(0, 16, 26, 0.45);
    border: 1px solid rgba(70, 190, 180, 0.28);
    border-radius: 3px;
    padding: 8px 11px;
    letter-spacing: 0.03em;
    font-size: 12px;
    line-height: 1.6;
    text-shadow: 0 0 8px rgba(80,255,210,0.2);
    pointer-events: none;
  }

  #pause-btn {
    position: fixed;
    right: 18px;
    top: 18px;
    z-index: 131;
    display: none;
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #d8fbff;
    background: rgba(0, 32, 46, 0.68);
    border: 1px solid rgba(90, 220, 255, 0.45);
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  #pause-btn:hover {
    background: rgba(0, 56, 78, 0.82);
  }

  .overlay-menu {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 8, 20, 0.76);
    backdrop-filter: blur(8px);
    z-index: 950;
  }
  .overlay-menu .menu-box {
    width: min(440px, 90vw);
    border: 1px solid rgba(100, 220, 240, 0.35);
    background: linear-gradient(160deg, rgba(0, 24, 44, 0.94), rgba(0, 26, 34, 0.92));
    border-radius: 4px;
    padding: 26px 24px 20px;
    color: #c7f4ff;
  }
  .overlay-menu h3 {
    font-size: 15px;
    letter-spacing: 0.14em;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .overlay-menu p {
    font-size: 13px;
    line-height: 1.8;
    color: rgba(184, 235, 245, 0.92);
    margin-bottom: 16px;
  }
  .menu-actions {
    display: flex;
    gap: 10px;
  }
  .menu-btn {
    flex: 1;
    padding: 11px 10px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.06em;
    border-radius: 3px;
    border: 1px solid rgba(90, 220, 230, 0.42);
    background: rgba(0, 60, 76, 0.58);
    color: #d8fdff;
    cursor: pointer;
  }
  .menu-btn:hover {
    background: rgba(0, 88, 108, 0.72);
  }

  /* ===== 粒子背景层 ===== */
  #bg-particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
</style>

<body>

<!-- 背景粒子 -->
<canvas id="bg-particles"></canvas>

<!-- Three.js 画布容器 -->
<div id="canvas-container"></div>

<!-- 拖拽状态指示 -->

</div>

<div id="infection-status">感染阶段：搜索目标</div>

<!-- 底部 HUD -->
<div id="hud" style="display:flex;">
  <span class="hud-item">滚轮按住+拖动 旋转视角</span>
  <span class="hud-sep">|</span>
  <span class="hud-item">滚轮滚动 缩放</span>
  <span class="hud-sep">|</span>
  <span class="hud-item">单击+拖拽 操控噬菌体</span>
</div>

<!-- 警告遮罩 -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>⚠ 播放前须知</h2>
    <div id="modal-warning">
      动画含微恐元素，请密集恐惧症、深海恐惧症、巨物恐惧症玩家选择<span class="bold-red">0级</span>；接受程度越高可选级数越高。
    </div>

    <button id="start-btn">进入模拟空间</button>

</div>

<!-- Three.js r158 via importmap + ES module -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
'use strict';

// ============================================================
//  背景粒子（模拟深海浮游生物）
// ============================================================
(function initBgParticles() {
  const cnv = document.getElementById('bg-particles');
  const ctx = cnv.getContext('2d');
  let W, H, particles = [];
  function resize() {
    W = cnv.width = window.innerWidth;
    H = cnv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * 9999,
      y: Math.random() * 9999,
      r: Math.random() * 1.2 + 0.2,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      a: Math.random() * 0.35 + 0.05,
      hue: Math.random() > 0.5 ? '160,255,230' : '80,180,240'
    });
  }
  let lastT = 0;
  function tick(t) {
    const dt = Math.min(t - lastT, 50); lastT = t;
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx * dt * 0.1;
      p.y += p.vy * dt * 0.1;
      if (p.x < 0) p.x += W; if (p.x > W) p.x -= W;
      if (p.y < 0) p.y += H; if (p.y > H) p.y -= H;
      ctx.beginPath();
      ctx.arc(p.x % W, p.y % H, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.hue},${p.a})`;
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// ============================================================
//  模式遮罩 UI
// ============================================================
let selectedLevel = 0;
let selectedControlMode = 'manual';
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedLevel = parseInt(btn.dataset.level);
  });
});
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedControlMode = btn.dataset.mode;
  });
});
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('modal-overlay').style.display = 'none';
  initGame(selectedLevel, selectedControlMode);
});

// ============================================================
//  Tone.js-free 音效（Web Audio API）
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playDing() {
  ensureAudio();
  const now = audioCtx.currentTime;
  // 主音
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(1200, now);
  osc1.frequency.exponentialRampToValueAtTime(900, now + 0.5);
  gain1.gain.setValueAtTime(0.35, now);
  gain1.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
  osc1.connect(gain1).connect(audioCtx.destination);
  osc1.start(now); osc1.stop(now + 1.8);

  // 回声1
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(1190, now + 0.08);
  osc2.frequency.exponentialRampToValueAtTime(880, now + 0.6);
  gain2.gain.setValueAtTime(0.15, now + 0.08);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.2);
  osc2.connect(gain2).connect(audioCtx.destination);
  osc2.start(now + 0.08); osc2.stop(now + 2.2);

  // 回声2
  const osc3 = audioCtx.createOscillator();
  const gain3 = audioCtx.createGain();
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(1180, now + 0.22);
  osc3.frequency.exponentialRampToValueAtTime(860, now + 0.8);
  gain3.gain.setValueAtTime(0.07, now + 0.22);
  gain3.gain.exponentialRampToValueAtTime(0.001, now + 2.8);
  osc3.connect(gain3).connect(audioCtx.destination);
  osc3.start(now + 0.22); osc3.stop(now + 2.8);
}

// ============================================================
//  游戏主逻辑
// ============================================================
function initGame(level, controlMode) {
  ensureAudio();

  const container = document.getElementById('canvas-container');

  // ---------- Renderer ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = false;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.9;
  container.appendChild(renderer.domElement);

  // ---------- Scene ----------
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x00040e);
  scene.fog = new THREE.FogExp2(0x000814, 0.00135);

  // ---------- Camera ----------
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
  // 初始相机位置：噬菌体后方45°俯视
  camera.position.set(0, 14, 20);
  camera.lookAt(0, 0, 0);

  // ---------- Lights ----------
  const ambient = new THREE.AmbientLight(0x002244, 1.9);
  scene.add(ambient);
  const rimLight = new THREE.DirectionalLight(0x00aaff, 1.45);
  rimLight.position.set(-20, 30, -20);
  scene.add(rimLight);
  const fillLight = new THREE.PointLight(0x005588, 1.1, 320);
  fillLight.position.set(0, -10, 0);
  scene.add(fillLight);
  // 幽蓝氛围光
  const blueGlow = new THREE.PointLight(0x00a0ff, 1.0, 280);
  blueGlow.position.set(20, 20, 20);
  scene.add(blueGlow);
  // 墨绿氛围光
  const greenGlow = new THREE.PointLight(0x00aa66, 0.75, 240);
  greenGlow.position.set(-30, -20, 10);
  scene.add(greenGlow);

  // ============================================================
  //  球形边界
  // ============================================================
  // 噬菌体尺寸约 ~8 单位高（程序化），大肠杆菌长度 = 80 单位
  // 可移动空间球直径 = 大肠杆菌长度 × 10 = 800 → 半径400
  const PHAGE_HEIGHT = 8;       // 噬菌体程序化高度（单位）
  const ECOLI_LENGTH = 80;      // 大肠杆菌长度 (10 × 噬菌体高度)
  const SPACE_RADIUS = 400;     // 球形空间半径

  // ============================================================
  //  程序化大肠杆菌模型
  // ============================================================
  const ecoliGroup = new THREE.Group();
  scene.add(ecoliGroup);
  // 大肠杆菌跟随荧光，提升深海低光场景中的可发现性
  const ecoliBiolight = new THREE.PointLight(0x7affb0, 1.6, 180, 2.0);
  scene.add(ecoliBiolight);

  // ---- 菌体（胶囊形）----
  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x49a66a,
    roughness: 0.78,
    metalness: 0.04,
    emissive: 0x00662a,
    emissiveIntensity: 1.05,
    transparent: true,
    opacity: 1.0,
  });
  // capsule: radius 12, length 56 → 总长 ~80
  const bodyGeo = new THREE.CapsuleGeometry(12, 56, 20, 32);
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
  bodyMesh.rotation.z = Math.PI / 2; // 横躺
  ecoliGroup.add(bodyMesh);

  // ---- 荧光绿轮廓发光层 ----
  const outlineMat = new THREE.MeshBasicMaterial({
    color: 0x66ff99,
    side: THREE.BackSide,
    transparent: true,
    opacity: 0.25 + level * 0.04,
  });
  const outlineGeo = new THREE.CapsuleGeometry(12.6, 56, 20, 32);
  const outlineMesh = new THREE.Mesh(outlineGeo, outlineMat);
  outlineMesh.rotation.z = Math.PI / 2;
  ecoliGroup.add(outlineMesh);

  // ---- 菌毛（短毛刺）----
  const piliFibers = [];
  const piliMat = new THREE.MeshStandardMaterial({
    color: 0x65b875,
    roughness: 1.0, metalness: 0,
    emissive: 0x004a1e,
    emissiveIntensity: 0.65,
  });
  function addPilus(x, y, z, dirX, dirY, dirZ, len) {
    const geo = new THREE.CylinderGeometry(0.18, 0.04, len, 4);
    const m = new THREE.Mesh(geo, piliMat);
    m.position.set(x, y, z);
    m.userData.baseDir = new THREE.Vector3(dirX, dirY, dirZ).normalize();
    m.userData.basePos = new THREE.Vector3(x, y, z);
    m.userData.len = len;
    const axis = new THREE.Vector3(0, 1, 0);
    const dir = new THREE.Vector3(dirX, dirY, dirZ).normalize();
    const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, dir);
    m.quaternion.copy(quaternion);
    m.position.addScaledVector(dir, len / 2);
    ecoliGroup.add(m);
    piliFibers.push(m);
  }
  // 沿着菌体长轴（X轴）均匀分布菌毛
  for (let xi = -26; xi <= 26; xi += 8) {
    for (let a = 0; a < 8; a++) {
      const angle = (a / 8) * Math.PI * 2 + xi * 0.3;
      const cosa = Math.cos(angle), sina = Math.sin(angle);
      addPilus(xi, cosa * 12, sina * 12, 0, cosa, sina, 5 + Math.random() * 3);
    }
  }

  // ---- 鞭毛（4条长波浪线）----
  const flagellaMat = new THREE.MeshStandardMaterial({
    color: 0x58a66a,
    roughness: 1.0,
    emissive: 0x003f1b,
    emissiveIntensity: 0.55,
  });
  const flagellaData = []; // { curve, mesh, phase, baseOffset }

        baseY + Math.sin(t * freq * Math.PI + phase) * amp,
        baseZ + Math.cos(t * freq * Math.PI * 0.7 + phase) * amp * 0.5
      ));

    const curve = new THREE.CatmullRomCurve3(points);
    const geo = new THREE.TubeGeometry(curve, 50, 0.25, 5, false);
    const mesh = new THREE.Mesh(geo, flagellaMat.clone());
    ecoliGroup.add(mesh);
    flagellaData.push({ mesh, phase, baseX, baseY, baseZ });
    return { mesh, phase, baseX, baseY, baseZ };
  }

  // ============================================================
  //  碰撞边界检测

  function checkBoundary(obj, vel, radius) {
    const dist = obj.position.length();
    const r = radius || 2;
    if (dist + r >= SPACE_RADIUS) {
      playDing();
      // 法向量（球心→物体位置）
      const norm = obj.position.clone().normalize();
      // 反射速度：v' = v - 2(v·n)n
      const dot = vel.dot(norm);
      const reflected = vel.clone().sub(norm.clone().multiplyScalar(2 * dot));
      // 回推到球内（不破坏 position 方向）
      obj.position.copy(norm.multiplyScalar(SPACE_RADIUS - r - 0.5));
      return reflected;
    }
    return null;
  }

  function setPhageOpacity(alpha) {

      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach(mat => {
        if (mat.userData._baseOpacity == null) {
          mat.userData._baseOpacity = mat.opacity == null ? 1 : mat.opacity;
        }
        mat.transparent = true;
        mat.opacity = mat.userData._baseOpacity * alpha;
      });
    });
  }

  // ============================================================
  //  主循环
  // ============================================================
  const clock = new THREE.Clock();
  let timeAcc = 0;

  function animate() {
    requestAnimationFrame(animate);
    const frameDelta = clock.getDelta();
    if (gameState.paused) {
      renderer.render(scene, camera);
      return;
    }

    const dt = Math.min(frameDelta, 0.05);
    timeAcc += dt;

    // --------- 噬菌体运动 ---------
    const phageObj = phageState._gltfScene || phageGroup;
    const ecoliObj = ecoliState._gltfScene || ecoliGroup;
    const distToPhage = ecoliObj.position.distanceTo(phageObj.position);
    infection.timer += dt;

    const isAutoDemo = infection.mode === 'auto';

    if (infection.phase === 'search' && distToPhage < ECOLI_LENGTH * 2.3) {
      setInfectionPhase('approach');
    }

    if (infection.mode === 'auto' && (infection.phase === 'search' || infection.phase === 'approach')) {
      const seekDir = ecoliObj.position.clone().sub(phageObj.position).normalize();
      phageState.vel.addScaledVector(seekDir, 0.03);
      if (distToPhage < ECOLI_LENGTH * 0.48) {
        setInfectionPhase('attach');
        infection.attachNormal.copy(phageObj.position.clone().sub(ecoliObj.position).normalize());
      }
    }

    if (infection.mode === 'manual' && (infection.phase === 'search' || infection.phase === 'approach')) {
      if (distToPhage < ECOLI_LENGTH * 1.5) setInfectionPhase('approach');
      if (distToPhage < ECOLI_LENGTH * 0.45 && phageState.vel.length() < 0.55) {
        setInfectionPhase('attach');
        infection.attachNormal.copy(phageObj.position.clone().sub(ecoliObj.position).normalize());
      }
    }

    if (infection.phase === 'attach') {
      phageState.isDragging = false;
      isLeftDown = false;
      document.getElementById('dragging-indicator').style.display = 'none';
      orientPhageForAttach(phageObj, infection.attachNormal);
      const targetPos = ecoliObj.position.clone().add(infection.attachNormal.clone().multiplyScalar(ATTACH_DISTANCE));
      phageObj.position.lerp(targetPos, isAutoDemo ? 0.08 : 0.12);
      bodyMat.opacity = 0.62;
      // 安全约束：附着阶段中心距离不能低于最小值，防止陷入细菌体内
      const curDist = phageObj.position.distanceTo(ecoliObj.position);
      if (curDist < ATTACH_DISTANCE - 0.25) {
        phageObj.position.copy(ecoliObj.position.clone().add(infection.attachNormal.clone().multiplyScalar(ATTACH_DISTANCE - 0.25)));
      }
      phageState.vel.multiplyScalar(0.5);
      if (infection.timer > (isAutoDemo ? 2.8 : 1.9)) {
        setInfectionPhase('inject');
      }
    }

    if (infection.phase === 'inject') {
      phageState.isDragging = false;
      orientPhageForAttach(phageObj, infection.attachNormal);
      const targetPos = ecoliObj.position.clone().add(infection.attachNormal.clone().multiplyScalar(INJECT_DISTANCE));
      phageObj.position.lerp(targetPos, isAutoDemo ? 0.1 : 0.16);
      bodyMat.opacity = 0.5;
      const curDist = phageObj.position.distanceTo(ecoliObj.position);
      if (curDist < INJECT_DISTANCE - 0.25) {
        phageObj.position.copy(ecoliObj.position.clone().add(infection.attachNormal.clone().multiplyScalar(INJECT_DISTANCE - 0.25)));
      }
      phageState.vel.multiplyScalar(0.25);
      const injectDuration = isAutoDemo ? 6.8 : 4.8;
      const injectProgress = THREE.MathUtils.clamp(infection.timer / injectDuration, 0, 1);
      dnaMeshes.forEach(d => {
        d.scale.y = 1.0 - injectProgress * 0.95;
        d.scale.x = 1.0 - injectProgress * 0.32;
        d.scale.z = 1.0 - injectProgress * 0.32;
      });
      headMat.emissiveIntensity = 2.4 + Math.sin(timeAcc * 18.0) * 0.55 + injectProgress * 0.85;
      tailSheathGroup.scale.y = THREE.MathUtils.lerp(tailSheathGroup.scale.y, 0.78, 0.12);
      bodyMat.emissiveIntensity = 1.05 + injectProgress * 0.9;
      outlineMat.opacity = 0.25 + level * 0.04 + injectProgress * 0.08;
      if (infection.timer > injectDuration) {
        setInfectionPhase('infected');
      }
    }

    if (infection.phase === 'infected') {
      infection.isComplete = true;
      bodyMat.opacity = 0.72;
      const pulse = 0.7 + 0.3 * Math.sin(timeAcc * 5.2);
      bodyMat.emissiveIntensity = 1.65 + pulse * 0.65;
      outlineMat.opacity = 0.35 + level * 0.04 + pulse * 0.08;
      if (infection.timer > (isAutoDemo ? 2.3 : 1.5)) {
        phageObj.visible = false;
        setPhageOpacity(0.0);
        infection.shellHidden = true;
        setInfectionPhase('lysis');
      }
    }

    if (!infection.shellHidden && infection.phase !== 'lysis' && infection.phase !== 'infected') {
      phageObj.visible = true;
      setPhageOpacity(1.0);
    }

    if (infection.phase === 'lysis') {
      phageState.isDragging = false;
      bodyMat.opacity = 0.5;
      if (!lysisState.initiated) {
        lysisState.initiated = true;
        lysisState.anchor.copy(ecoliObj.position);
        lysisState.sourceScale.copy(ecoliObj.scale);
      }

      const t = infection.timer;
      const pressure = THREE.MathUtils.clamp(t / 1.0, 0, 1);
      const wobble = 1 + Math.sin(timeAcc * 16.0) * 0.06 * pressure;
      ecoliObj.scale.set(
        lysisState.sourceScale.x * (1 + pressure * 0.38),
        lysisState.sourceScale.y * (1 + pressure * 0.22) * wobble,
        lysisState.sourceScale.z * (1 + pressure * 0.22)
      );

      if (!lysisState.exploded && t > 0.9) {
        lysisState.exploded = true;
        lysisPoints.visible = true;
        lysisMat.opacity = 0.95;
        for (let i = 0; i < LYSIS_PARTICLE_COUNT; i++) {
          lysisPositions[i * 3] = lysisState.anchor.x + (Math.random() - 0.5) * 5;
          lysisPositions[i * 3 + 1] = lysisState.anchor.y + (Math.random() - 0.5) * 5;
          lysisPositions[i * 3 + 2] = lysisState.anchor.z + (Math.random() - 0.5) * 5;
          const dir = new THREE.Vector3(
            (Math.random() - 0.5),
            (Math.random() - 0.35),
            (Math.random() - 0.5)
          ).normalize();
          lysisVelocities[i].copy(dir.multiplyScalar(0.8 + Math.random() * 1.8));
        }
        lysisGeo.attributes.position.needsUpdate = true;
        ecoliObj.visible = false;
        ecoliBiolight.intensity = 2.8;
      }

      if (lysisState.exploded) {
        for (let i = 0; i < LYSIS_PARTICLE_COUNT; i++) {
          lysisPositions[i * 3] += lysisVelocities[i].x;
          lysisPositions[i * 3 + 1] += lysisVelocities[i].y;
          lysisPositions[i * 3 + 2] += lysisVelocities[i].z;
          lysisVelocities[i].multiplyScalar(0.985);
          lysisVelocities[i].y -= 0.004;
        }
        lysisGeo.attributes.position.needsUpdate = true;
        lysisMat.opacity = Math.max(0.0, 0.95 - (t - 0.9) * 0.26);
        ecoliBiolight.position.copy(lysisState.anchor);
        ecoliBiolight.intensity = Math.max(0.2, 2.8 - (t - 0.9) * 0.7);
      }

      if (t > 4.0) {
        showRoundComplete();
      }
    }

    if (infection.phase === 'search' || infection.phase === 'approach') {
      bodyMat.opacity = 1.0;
    }

    // --------- 相机更新（侵染阶段仍可鼠标自由旋转）---------
    camDist += (camTargetDist - camDist) * 0.08;
    const isInfectionFocus = infection.phase === 'attach' || infection.phase === 'inject' || infection.phase === 'infected';
    const desiredTarget = isInfectionFocus
      ? ecoliObj.position.clone().add(infection.attachNormal.clone().multiplyScalar(7.0))
      : (phageState._gltfScene || phageGroup).position;
    camTarget.lerp(desiredTarget, isInfectionFocus ? 0.08 : 0.04);

    // 相机位置（球坐标）
    const camX = camTarget.x + camDist * Math.sin(camPhi) * Math.sin(camTheta);
    const camY = camTarget.y + camDist * Math.cos(camPhi);
    const camZ = camTarget.z + camDist * Math.sin(camPhi) * Math.cos(camTheta);

    // 将相机限制在球形空间内
    const camPosVec = new THREE.Vector3(camX, camY, camZ);
    if (camPosVec.length() > SPACE_RADIUS - 1) {
      camPosVec.normalize().multiplyScalar(SPACE_RADIUS - 1);
    }
    camera.position.copy(camPosVec);
    camera.lookAt(camTarget);

    if (phageState.isDragging) {
      // 拖拽：将鼠标屏幕位移映射到3D空间（沿相机视角坐标系）
      const spd = 0.12;
      const fwd = getCameraForward();
      const rgt = getCameraRight();
      const up = camera.up.clone().normalize();

      const dx = phageState.dragDelta.x * spd;
      const dy = phageState.dragDelta.y * spd;
      // 向左/右拖 = 屏幕左右移动
      // 向上/下拖 = 屏幕上下移动（修复手动模式无法上下移动）
      phageState.vel.addScaledVector(rgt, dx * 0.18);
      phageState.vel.addScaledVector(up, -dy * 0.2);
      // 轻微保留前后惯性，维持空间纵深感
      phageState.vel.addScaledVector(fwd, -dy * 0.04);
      phageState.dragDelta.set(0, 0);

      // 倾斜噬菌体模型
      const tiltX = THREE.MathUtils.clamp(phageState.vel.dot(getCameraForward()) * -0.3, -0.25, 0.25);
      const tiltZ = THREE.MathUtils.clamp(phageState.vel.dot(getCameraRight()) * -0.2, -0.2, 0.2);
      phageGroup.rotation.x = THREE.MathUtils.lerp(phageGroup.rotation.x, tiltX, 0.12);
      phageGroup.rotation.z = THREE.MathUtils.lerp(phageGroup.rotation.z, tiltZ, 0.12);
    } else {
      // 静止：浮标上下浮动
      phageState.floating += dt * phageState.floatSpeed;
      const floatDY = Math.sin(phageState.floating) * phageState.floatAmp;
      phageState.vel.y += floatDY;
      // 阻力稳定
      phageGroup.rotation.x = THREE.MathUtils.lerp(phageGroup.rotation.x, 0, 0.08);
      phageGroup.rotation.z = THREE.MathUtils.lerp(phageGroup.rotation.z, 0, 0.08);
    }
    // 流体阻力
    phageState.vel.multiplyScalar(0.88);

    // 位移
    phageObj.position.add(phageState.vel);

    // 边界检测（噬菌体）
    {
      const newVel = checkBoundary(phageObj, phageState.vel, 7);
      if (newVel) {
        phageState.vel.copy(newVel).multiplyScalar(0.5);
      }
    }

    // 尾丝弹性形变（浮动时末端下垂）
    const floatDir = phageState.isDragging ? phageState.vel.clone().normalize() : new THREE.Vector3(0, 1, 0).multiplyScalar(Math.sin(phageState.floating));
    const floatSpeed = phageState.vel.length();
    const tailBend = floatSpeed * 6 + Math.sin(timeAcc * phageState.floatSpeed) * 0.3;
    tailFiberData.forEach((fd, idx) => {
      const bendDir = phageState.isDragging
        ? phageState.vel.clone().normalize().negate()
        : new THREE.Vector3(0, -1, 0);
      const pts = [
        new THREE.Vector3(fd.baseX, fd.baseY, fd.baseZ),
        new THREE.Vector3(fd.baseX * 2.2, fd.baseY - 1.5 + bendDir.y * tailBend * 0.2, fd.baseZ * 2.2),
        new THREE.Vector3(fd.baseX * 2.8, fd.baseY - 3.5 + bendDir.y * tailBend * 0.5, fd.baseZ * 2.8),
        new THREE.Vector3(
          fd.baseX * 2.0 + bendDir.x * tailBend * 0.4,
          fd.baseY - 5.5 + bendDir.y * tailBend,
          fd.baseZ * 2.0 + bendDir.z * tailBend * 0.4
        ),
      ];
      const newCurve = new THREE.CatmullRomCurve3(pts);
      const newGeo = new THREE.TubeGeometry(newCurve, 20, 0.12, 5, false);
      fd.mesh.geometry.dispose();
      fd.mesh.geometry = newGeo;
    });

    // 尾鞘弹性压缩（移动时轻微拉伸）
    const tailStretch = 1.0 + floatSpeed * 0.2 + Math.sin(timeAcc * phageState.floatSpeed) * 0.02;
    tailSheathGroup.scale.y = THREE.MathUtils.lerp(tailSheathGroup.scale.y, tailStretch, 0.1);

    // --------- 大肠杆菌运动 ---------
    ecoliBiolight.position.lerp(ecoliObj.position, 0.14);

    // 逃跑检测
    const isInfectionLock = infection.phase === 'attach' || infection.phase === 'inject' || infection.phase === 'infected' || infection.phase === 'lysis';
    const fleeThreshold = ECOLI_LENGTH * 1.0;
    if (!isInfectionLock && distToPhage < fleeThreshold) {
      ecoliState.fleeMode = true;
    } else {
      ecoliState.fleeMode = false;
    }

    // 加速度随机变化
    ecoliState.accTimer += dt;
    if (ecoliState.accTimer > ecoliState.accInterval) {
      ecoliState.accTimer = 0;
      ecoliState.accInterval = 4.5 + Math.random() * 4.0;
      // 随机新方向
      const rx = (Math.random() - 0.5) * 2;
      const ry = (Math.random() - 0.5) * 2;
      const rz = (Math.random() - 0.5) * 2;
      ecoliState.acc.set(rx, ry, rz).normalize().multiplyScalar(0.001 + Math.random() * 0.0016);
    }

    if (ecoliState.fleeMode) {
      // 逃跑：远离噬菌体
      const fleeDir = ecoliObj.position.clone().sub(phageObj.position).normalize();
      ecoliState.acc.copy(fleeDir).multiplyScalar(0.0026);
    }

    if (isInfectionLock) {
      ecoliState.acc.multiplyScalar(0.5);
      ecoliState.vel.multiplyScalar(0.88);
      ecoliState.vel.y += Math.sin(timeAcc * 2.2) * 0.002;
    } else {
      ecoliState.vel.add(ecoliState.acc);
    }
    // 速度限制
    const maxVel = ecoliState.fleeMode ? 0.12 : 0.07;
    if (ecoliState.vel.length() > maxVel) {
      ecoliState.vel.normalize().multiplyScalar(maxVel);
    }
    // 流体阻力
    ecoliState.vel.multiplyScalar(0.96);

    ecoliObj.position.add(ecoliState.vel);

    // 边界检测（大肠杆菌）
    {
      const newVel = checkBoundary(ecoliObj, ecoliState.vel, 16);
      if (newVel) {
        ecoliState.vel.copy(newVel).multiplyScalar(0.4);
        // 加速度反转以避免再次撞墙
        const norm = ecoliObj.position.clone().normalize();
        const aDot = ecoliState.acc.dot(norm);
        if (aDot > 0) ecoliState.acc.sub(norm.multiplyScalar(2 * aDot));
      }
    }

    // 大肠杆菌朝向（面对移动方向）
    if (ecoliState.vel.length() > 0.012) {
      const targetQ = new THREE.Quaternion();
      const moveDir = ecoliState.vel.clone().normalize();
      ecoliState.smoothDir.lerp(moveDir, 0.08).normalize();
      // 菌体长轴是局部X轴 → 旋转到moveDir
      const xAxis = new THREE.Vector3(1, 0, 0);
      targetQ.setFromUnitVectors(xAxis, ecoliState.smoothDir);
      ecoliObj.quaternion.slerp(targetQ, 0.018);
    }

    // 鞭毛动画
    const velLen = ecoliState.vel.length();
    const waveAmp = THREE.MathUtils.clamp(4 + velLen * 42, 4, 18);
    const waveFreq = THREE.MathUtils.clamp(2.2 + velLen * 12, 2.2, 6.0);
    flagellaData.forEach((fd, idx) => {
      const pts = [];
      const segments = 30;
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const len = 90;
        const a = waveAmp * (0.5 + t);
        pts.push(new THREE.Vector3(
          -len * t,
          Math.sin(t * waveFreq * Math.PI + fd.phase + timeAcc * (2 + velLen * 20)) * a,
          Math.cos(t * waveFreq * Math.PI * 0.7 + fd.phase + timeAcc * (1.5 + velLen * 15)) * a * 0.5
        ));
      }
      const curve = new THREE.CatmullRomCurve3(pts);
      const geo = new THREE.TubeGeometry(curve, 50, 0.25, 5, false);
      fd.mesh.geometry.dispose();
      fd.mesh.geometry = geo;
    });

    // 菌毛轻微飘动
    piliFibers.forEach((pili, idx) => {
      const t = timeAcc * 0.8 + idx * 0.7;
      const baseDir = pili.userData.baseDir;
      const wobble = Math.sin(t + idx) * 0.15 * (1 + velLen * 8);
      const wobble2 = Math.cos(t * 1.3 + idx) * 0.1;
      const dir = baseDir.clone();
      dir.x += wobble;
      dir.y += wobble2;
      dir.normalize();
      const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      pili.quaternion.slerp(q, 0.15);
    });

    // --------- 渲染 ---------
    // 大肠杆菌方向指示：当距离较远时提示方向
    const toEcoli = ecoliObj.position.clone().sub(camera.position);
    const camForward = getCameraForward();
    const farEnough = camera.position.distanceTo(ecoliObj.position) > 55;
    const inFront = camForward.dot(toEcoli.clone().normalize()) > 0.25;
    if (farEnough && !inFront) {
      const right = getCameraRight();
      const up = camera.up.clone().normalize();
      const x = right.dot(toEcoli);
      const y = up.dot(toEcoli);
      const ang = Math.atan2(y, x) * 180 / Math.PI;
      ecoliArrow.style.transform = `rotate(${ang}deg)`;
      ecoliIndicator.style.display = 'flex';
    } else {
      ecoliIndicator.style.display = 'none';
    }

    renderer.render(scene, camera);
  }

  animate();
}
</script>
</body>
</html>
